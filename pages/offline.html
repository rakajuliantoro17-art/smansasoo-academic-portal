<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Offline | SMANSASOO Academic Portal</title>

<link rel="icon" href="../assets/logo.png">

<link rel="stylesheet" href="../css/variables.css">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/responsive.css">
<link rel="stylesheet" href="../css/animation.css">

<link rel="preconnect"
      href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet">

<style>

body{

    display:flex;

    align-items:center;

    justify-content:center;

    min-height:100vh;

    background:var(--background);

}

.offline-card{

    width:min(92%,500px);

    background:var(--surface);

    border-radius:24px;

    padding:40px;

    text-align:center;

    box-shadow:var(--shadow-lg);

}

.offline-logo{

    width:90px;

    margin-bottom:20px;

}

.offline-icon{

    font-size:72px;

    margin-bottom:20px;

}

.offline-title{

    font-size:2rem;

    color:var(--primary);

    font-weight:800;

}

.offline-text{

    margin:20px 0;

    color:var(--text-light);

}

.retry-btn{

    margin-top:20px;

    width:100%;

    height:52px;

    border:none;

    border-radius:14px;

    cursor:pointer;

    background:var(--primary);

    color:#fff;

    font-size:16px;

    font-weight:700;

    transition:.25s;

}

.retry-btn:hover{

    opacity:.9;

}

footer{

    margin-top:25px;

    color:var(--text-light);

    font-size:14px;

}

</style>

</head>

<body>

<div class="offline-card fade-in">

    <img src="../assets/logo.png"
         class="offline-logo"
         alt="SMAN 1 Sooko">

    <div class="offline-icon">

        📡

    </div>

    <h1 class="offline-title">

        Anda Sedang Offline

    </h1>

    <p class="offline-text">

        Portal Akademik tidak dapat terhubung ke internet
        atau server Google Apps Script.

        <br><br>

        Silakan periksa koneksi internet,
        kemudian tekan tombol di bawah untuk mencoba kembali.

    </p>

    <button
        class="retry-btn"
        onclick="location.reload()">

        Coba Lagi

    </button>

    <footer>

        <strong>

            SMANSASOO Academic Portal

        </strong>

        <br>

        Version 1.0.0

    </footer>

</div>

</body>

</html>
