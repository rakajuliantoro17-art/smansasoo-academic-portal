<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SMAN 1 Sooko Mojokerto | Pengumuman Kenaikan Kelas</title>

    <meta name="description"
        content="Portal Pengumuman Kenaikan Kelas dan Pembagian Kelas Baru SMAN 1 Sooko Mojokerto">

    <meta name="theme-color" content="#0F4C81">

    <!-- Favicon -->
    <link rel="icon" href="assets/logo/favicon.ico">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/variables.css">

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="css/responsive.css">

    <link rel="stylesheet" href="css/glass.css">

</head>

<body>

    <!-- Lapisan background foto sekolah (blur + gradient),
         lihat css/glass.css -->
    <div class="bg-layer" aria-hidden="true"></div>

    <!-- ================= HEADER ================= -->

    <header class="header">

        <div class="container">

            <img src="assets/logo/logo.png"
                 alt="Logo SMAN 1 Sooko"
                 class="logo">

            <h1>
                Pengumuman
                <span>Kenaikan Kelas</span>
            </h1>

            <p>
                Tahun Pelajaran
                <strong>2026 / 2027</strong>
            </p>

        </div>

    </header>



    <!-- ================= SEARCH ================= -->

    <main>

        <section class="search-section">

            <div class="container">

                <div class="search-card">

                    <h2>Cek Hasil</h2>

                    <p>

                        Masukkan NIS atau NISN untuk melihat hasil
                        kenaikan kelas dan pembagian kelas baru.

                    </p>

                    <form id="searchForm">

                        <input
                            type="text"
                            id="keyword"
                            placeholder="Masukkan NIS / NISN"
                            autocomplete="off"
                            required>

                        <button type="submit">

                            Cari

                        </button>

                    </form>

                </div>

            </div>

        </section>



        <!-- ================= RESULT AREA =================
             Satu container tunggal untuk loading / hasil / error.
             Diisi dan ditampilkan sepenuhnya oleh js/ui.js
             (class "hidden" dilepas/ditambah lewat JS, bukan statis). -->

        <section class="container">

            <div id="result" class="hidden"></div>

        </section>

    </main>



    <!-- ================= FOOTER ================= -->

    <footer>

        <div class="container">

            <p>

                © 2026

                SMAN 1 Sooko Mojokerto

            </p>

            <small>

                Academic Portal Version 1.2

            </small>

        </div>

    </footer>



    <!-- ================= CELEBRATION LAYER =================
         Flash, balon, dan overlay perayaan hanya dipakai untuk
         status NAIK. Isinya diisi oleh js/ui.js saat dibutuhkan. -->

    <div class="flash" id="flash" aria-hidden="true"></div>

    <div id="balloons" aria-hidden="true"></div>

    <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-label="Hasil Pengumuman Kenaikan Kelas">

        <div class="result-box" id="overlayBox">
            <!-- diisi js/ui.js -->
        </div>

    </div>

    <!-- src diisi dinamis oleh js/ui.js (CONFIG.CELEBRATION_AUDIO_URL) -->
    <audio id="celebrationSound" preload="none"></audio>



    <!-- CONFETTI LIBRARY -->

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <!-- CONFIG -->

    <script src="js/config.js"></script>

    <!-- UTILS -->

    <script src="js/utils.js"></script>

    <!-- API -->

    <script src="js/api.js"></script>

    <!-- UI -->

    <script src="js/ui.js"></script>

    <!-- SEARCH -->

    <script src="js/search.js"></script>

    <!-- APP (bootstrap) -->

    <script src="js/app.js"></script>

</body>

</html>
